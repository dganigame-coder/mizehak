<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Aircraft Map FIXED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{margin:0;height:100%;overflow:hidden;background:#050814;font-family:monospace}
#map{position:absolute;width:100%;height:100%}

.panel{
  position:absolute;top:10px;left:10px;
  z-index:9999;
  background:rgba(0,0,0,0.8);
  padding:10px;
  width:240px;
  border-left:3px solid #00ff9d;
  color:white;
  font-size:12px;
}

.status{color:#00ff9d;margin-top:6px}
button{margin-top:6px;width:100%;padding:6px;background:#111;color:white;border:1px solid #333;cursor:pointer}
button:hover{border-color:#00ff9d}
</style>
</head>

<body>

<div class="panel">
<b>✈ AIR TRAFFIC FIXED</b>
<div class="status" id="status">loading...</div>
<button onclick="reload()">Reload</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([20,0],2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"OSM"
}).addTo(map);

const planes = new Map();

/* =========================
   CORS PROXY FIX
========================= */
const API =
  "https://api.allorigins.win/raw?url=" +
  encodeURIComponent("https://opensky-network.org/api/states/all");

/* =========================
   LOAD AIRCRAFT
========================= */
async function load(){

  try{
    const res = await fetch(API);
    const data = await res.json();

    if(!data.states){
      document.getElementById("status").innerText = "no aircraft data";
      return;
    }

    data.states.slice(0,80).forEach(s => {

      const id = s[0];
      const lat = s[6];
      const lon = s[5];

      if(!lat || !lon) return;

      if(!planes.has(id)){
        planes.set(id,
          L.circleMarker([lat,lon],{
            radius:3,
            color:"#00ff9d"
          }).addTo(map)
        );
      } else {
        planes.get(id).setLatLng([lat,lon]);
      }
    });

    document.getElementById("status").innerText =
      "aircraft live ✔";

  } catch(e){
    document.getElementById("status").innerText =
      "API blocked (proxy failed)";
    console.log(e);
  }
}

/* =========================
   AUTO REFRESH
========================= */
function reload(){
  load();
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
