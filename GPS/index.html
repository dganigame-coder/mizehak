<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS STABLE ENGINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#050814;
    font-family:monospace;
    color:#e2e8f0;
}

#map,#three{
    position:absolute;
    width:100%;
    height:100%;
}

#three{display:none;}

.hud{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.65);
    padding:10px;
    border-left:3px solid #00ff9d;
    z-index:1000;
    font-size:12px;
}

.controls{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
}

button{
    margin:3px;
    padding:8px 12px;
    background:transparent;
    border:1px solid #444;
    color:white;
    cursor:pointer;
}

button:hover{border-color:#00ff9d;}
</style>
</head>
<body>

<div class="hud" id="hud">
🧠 NEXUS ENGINE<br>
Status: <span id="status">INIT</span><br>
Entities: <span id="count">0</span>
</div>

<div class="controls">
<button onclick="App.setView('map')">MAP</button>
<button onclick="App.setView('three')">3D</button>
<button onclick="App.toggleGPS()">GPS</button>
<button onclick="App.runTests()">TEST</button>
</div>

<div id="map"></div>
<canvas id="three"></canvas>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================
   SAFE APP CORE
========================= */
const App = (()=>{

    const state = {
        view:"map",
        entities:new Map(),
        gpsWatch:null,
        ok:true
    };

    /* =========================
       INIT SAFE CHECK
    ========================= */
    function safe(el){
        return document.getElementById(el);
    }

    /* =========================
       INIT ENTITIES
    ========================= */
    function init(){
        try{

            for(let i=0;i<25;i++){
                state.entities.set("p"+i,{
                    id:"p"+i,
                    lat:32 + Math.random()*0.2,
                    lon:34 + Math.random()*0.2,
                    vx:(Math.random()-0.5)*0.002,
                    vy:(Math.random()-0.5)*0.002
                });
            }

            document.getElementById("status").innerText="READY";

        }catch(e){
            console.error("INIT FAIL",e);
            state.ok=false;
        }
    }

    /* =========================
       SIMULATION (SAFE)
    ========================= */
    function step(){

        if(!state.ok) return;

        for(let e of state.entities.values()){

            let dx=0,dy=0;

            for(let o of state.entities.values()){
                if(o===e) continue;

                let x=o.lon-e.lon;
                let y=o.lat-e.lat;
                let d=Math.sqrt(x*x+y*y);

                if(d<0.05){
                    dx+=x;
                    dy+=y;
                }
            }

            e.vx += dx*0.001;
            e.vy += dy*0.001;

            e.vx = Math.max(-0.01,Math.min(0.01,e.vx));
            e.vy = Math.max(-0.01,Math.min(0.01,e.vy));

            e.lat += e.vy;
            e.lon += e.vx;
        }
    }

    /* =========================
       VIEW SWITCH (ROBUST)
    ========================= */
    function setView(v){

        state.view=v;

        const map = safe("map");
        const three = safe("three");

        if(!map || !three){
            console.error("Missing DOM");
            return;
        }

        map.style.display = (v==="map")?"block":"none";
        three.style.display = (v==="three")?"block":"none";
    }

    /* =========================
       LEAFLET
    ========================= */
    const map = L.map("map").setView([32,34],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    const markers = new Map();

    function renderMap(){

        if(state.view!=="map") return;

        state.entities.forEach(e=>{

            if(!markers.has(e.id)){
                markers.set(e.id,
                    L.circleMarker([e.lat,e.lon],
                        {radius:4,color:"#00ff9d"}).addTo(map)
                );
            }

            markers.get(e.id).setLatLng([e.lat,e.lon]);
        });
    }

    /* =========================
       THREE.JS SAFE
    ========================= */
    const canvas = document.getElementById("three");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

    const renderer = new THREE.WebGLRenderer({canvas});
    renderer.setSize(innerWidth,innerHeight);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(2,32,32),
        new THREE.MeshBasicMaterial({color:0x0033ff})
    );

    scene.add(globe);
    camera.position.z=5;

    const dots = new Map();

    function render3D(){

        if(state.view!=="three") return;

        state.entities.forEach(e=>{

            if(!dots.has(e.id)){
                let m=new THREE.Mesh(
                    new THREE.SphereGeometry(0.03),
                    new THREE.MeshBasicMaterial({color:0xffcc00})
                );
                globe.add(m);
                dots.set(e.id,m);
            }

            let phi=(90-e.lat)*Math.PI/180;
            let theta=(e.lon+180)*Math.PI/180;

            dots.get(e.id).position.set(
                -2*Math.sin(phi)*Math.cos(theta),
                 2*Math.cos(phi),
                 2*Math.sin(phi)*Math.sin(theta)
            );
        });

        globe.rotation.y += 0.001;
        renderer.render(scene,camera);
    }

    /* =========================
       GPS (SAFE OPTIONAL)
    ========================= */
    function toggleGPS(){

        if(!navigator.geolocation){
            alert("No GPS support");
            return;
        }

        if(state.gpsWatch){
            navigator.geolocation.clearWatch(state.gpsWatch);
            state.gpsWatch=null;
            return;
        }

        state.gpsWatch = navigator.geolocation.watchPosition(p=>{

            state.entities.set("user",{
                id:"user",
                lat:p.coords.latitude,
                lon:p.coords.longitude,
                vx:0,
                vy:0
            });

        },err=>console.log(err));
    }

    /* =========================
       TEST SYSTEM (REAL DEBUGGING)
    ========================= */
    function runTests(){

        console.clear();
        let results=[];

        function check(n,v){
            results.push({n,pass:!!v});
        }

        check("DOM map", !!safe("map"));
        check("DOM three", !!safe("three"));
        check("entities exist", state.entities.size>0);

        step();
        let e=[...state.entities.values()][0];
        let moved = (e.lat!==undefined && e.lon!==undefined);
        check("simulation runs", moved);

        results.forEach(r=>{
            console.log(r.pass?"✅":"❌",r.n);
        });

        document.getElementById("status").innerText=
            results.filter(r=>r.pass).length+"/"+results.length;
    }

    /* =========================
       MAIN LOOP (STABLE)
    ========================= */
    function loop(){

        try{
            step();
            renderMap();
            render3D();

            document.getElementById("count").innerText=
                state.entities.size;

        }catch(e){
            console.error("LOOP ERROR",e);
            state.ok=false;
        }

        requestAnimationFrame(loop);
    }

    window.onresize=()=>{
        renderer.setSize(innerWidth,innerHeight);
        camera.aspect=innerWidth/innerHeight;
        camera.updateProjectionMatrix();
    };

    init();
    loop();

    return {setView,toggleGPS,runTests};

})();

/* START */
App.setView("map");
</script>

</body>
</html>
