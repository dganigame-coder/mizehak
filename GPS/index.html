<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TITAN v4 | Predictive Nexus Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root { --neon: #00ff9d; --bg: #020617; --panel: rgba(7, 15, 30, 0.9); }
        body, html { margin: 0; height: 100%; background: var(--bg); color: #e2e8f0; font-family: 'fira code', monospace; overflow: hidden; }
        
        canvas, #map { position: absolute; width: 100%; height: 100%; visibility: hidden; opacity: 0; transition: opacity 0.5s ease; }
        .active { visibility: visible !important; opacity: 1 !important; }

        .telemetry-hud {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--panel); border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 15px; width: 300px; backdrop-filter: blur(10px);
            pointer-events: none;
        }

        .view-nav {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 1000; padding: 10px; background: rgba(0,0,0,0.5);
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            background: rgba(255,255,255,0.05); border: 1px solid #334155; color: #94a3b8;
            padding: 8px 16px; cursor: pointer; font-size: 11px; text-transform: uppercase;
            transition: all 0.2s;
        }

        button.selected { border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 157, 0.1); }
        .data-point { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; }
        .label { color: #64748b; }
    </style>
</head>
<body>

<div class="telemetry-hud" id="hud">
    <div style="color: var(--neon); font-size: 12px; margin-bottom: 10px;">[ TITAN_CORE_V4 ]</div>
    <div id="entity-monitor"></div>
</div>

<div class="view-nav">
    <button onclick="Core.setView('map')" id="btn-map">2D_Tactical</button>
    <button onclick="Core.setView('three')" id="btn-three">3D_Orbital</button>
    <button onclick="Core.setView('babylon')" id="btn-babylon">Sim_Grid</button>
    <button onclick="Core.toggleGPS()" id="btn-gps" style="color: #ff4757;">GPS_Link</button>
</div>

<div id="map"></div>
<canvas id="three"></canvas>
<canvas id="babylon"></canvas>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
/**
 * ARCHITECTURAL LAYER: REACTIVE STATE & PREDICTION LOGIC
 */
const Core = (() => {
    const state = {
        entities: new Map(),
        subscribers: [],
        currentView: 'map',
        gpsId: null,
        historyLimit: 50
    };

    const notify = () => state.subscribers.forEach(fn => fn(state));

    return {
        subscribe: (fn) => state.subscribers.push(fn),
        
        updateEntity: (id, lat, lon) => {
            const now = performance.now();
            let e = state.entities.get(id);

            if (!e) {
                e = { 
                    lat, lon, vLat: 0, vLon: 0, 
                    lastUpdate: now, history: [], 
                    renderPos: { lat, lon } // Interpolation target
                };
            } else {
                const dt = (now - e.lastUpdate) / 1000; // time in seconds
                if (dt > 0) {
                    e.vLat = (lat - e.lat) / dt;
                    e.vLon = (lon - e.lon) / dt;
                }
                e.history.push({ lat: e.lat, lon: e.lon });
                if (e.history.length > state.historyLimit) e.history.shift();
                
                e.lat = lat;
                e.lon = lon;
                e.lastUpdate = now;
            }
            state.entities.set(id, e);
            notify();
        },

        // Prediction Extrapolation
        getPredictedPosition: (id) => {
            const e = state.entities.get(id);
            if (!e) return null;
            const elapsed = (performance.now() - e.lastUpdate) / 1000;
            return {
                lat: e.lat + (e.vLat * elapsed),
                lon: e.lon + (e.vLon * elapsed)
            };
        },

        setView: (v) => {
            state.currentView = v;
            ['map', 'three', 'babylon'].forEach(id => {
                document.getElementById(id).classList.toggle('active', id === v);
                document.getElementById(`btn-${id}`).classList.toggle('selected', id === v);
            });
            notify();
        },

        toggleGPS: () => {
            if (state.gpsId) {
                navigator.geolocation.clearWatch(state.gpsId);
                state.gpsId = null;
                document.getElementById('btn-gps').innerText = 'GPS_LINK';
            } else {
                state.gpsId = navigator.geolocation.watchPosition(
                    p => Core.updateEntity('user', p.coords.latitude, p.coords.longitude),
                    null, { enableHighAccuracy: true }
                );
                document.getElementById('btn-gps').innerText = 'GPS_ONLINE';
            }
        },

        getState: () => state
    };
})();

/**
 * RENDER ADAPTER: THREE.JS (Orbital)
 */
const ThreeAdapter = (() => {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(2, 64, 64),
        new THREE.MeshStandardMaterial({ 
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            roughness: 0.5 
        })
    );
    scene.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(5, 3, 5);
    scene.add(sun);
    camera.position.z = 5;

    const meshes = new Map();

    const latLonToVec3 = (lat, lon, radius = 2.02) => {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    };

    function animate() {
        requestAnimationFrame(animate);
        const state = Core.getState();
        if (state.currentView !== 'three') return;

        state.entities.forEach((e, id) => {
            if (!meshes.has(id)) {
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({ color: 0x00ff9d }));
                scene.add(m);
                meshes.set(id, m);
            }

            // 1. Get Extrapolation
            const predicted = Core.getPredictedPosition(id);
            
            // 2. Linear Interpolation (Lerp) for Render Position
            e.renderPos.lat += (predicted.lat - e.renderPos.lat) * 0.1;
            e.renderPos.lon += (predicted.lon - e.renderPos.lon) * 0.1;

            // 3. Map to 3D Space
            meshes.get(id).position.copy(latLonToVec3(e.renderPos.lat, e.renderPos.lon));
        });

        globe.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }
    return { init: animate };
})();

/**
 * RENDER ADAPTER: LEAFLET (2D Tactical)
 */
const MapAdapter = (() => {
    const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    
    const elements = new Map();

    Core.subscribe(state => {
        if (state.currentView !== 'map') return;
        state.entities.forEach((e, id) => {
            if (!elements.has(id)) {
                const marker = L.circleMarker([e.lat, e.lon], { color: '#00ff9d', radius: 5 }).addTo(map);
                const poly = L.polyline([], { color: '#00ff9d', weight: 1, opacity: 0.5 }).addTo(map);
                elements.set(id, { marker, poly });
            }
            const { marker, poly } = elements.get(id);
            marker.setLatLng([e.lat, e.lon]);
            poly.setLatLngs(e.history.map(h => [h.lat, h.lon]));
        });
    });
})();

/**
 * RENDER ADAPTER: BABYLON.JS (Sim Grid)
 */
const BabylonAdapter = (() => {
    const canvas = document.getElementById("babylon");
    const engine = new BABYLON.Engine(canvas, true);
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.01, 0.02, 0.04, 1);

    const camera = new BABYLON.ArcRotateCamera("cam", 0, 0.8, 30, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);
    new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

    const grid = BABYLON.MeshBuilder.CreateGround("grid", { width: 1000, height: 1000, subdivisions: 100 }, scene);
    const gridMat = new BABYLON.StandardMaterial("gmat", scene);
    gridMat.wireframe = true;
    gridMat.emissiveColor = new BABYLON.Color3(0, 0.2, 0.4);
    grid.material = gridMat;

    const meshes = new Map();

    engine.runRenderLoop(() => {
        const state = Core.getState();
        if (state.currentView !== 'babylon') return;

        state.entities.forEach((e, id) => {
            if (!meshes.has(id)) {
                const box = BABYLON.MeshBuilder.CreateBox(id, { size: 1 }, scene);
                box.material = new BABYLON.StandardMaterial("m", scene);
                box.material.emissiveColor = new BABYLON.Color3(0, 1, 0.6);
                meshes.set(id, box);
            }
            
            const predicted = Core.getPredictedPosition(id);
            // Babylon specific lerp for simulated grid
            const targetX = predicted.lon * 10;
            const targetZ = predicted.lat * 10;
            
            meshes.get(id).position.x += (targetX - meshes.get(id).position.x) * 0.05;
            meshes.get(id).position.z += (targetZ - meshes.get(id).position.z) * 0.05;
        });

        scene.render();
    });
})();

/**
 * DATA SOURCE: ISS TRACKER
 */
setInterval(async () => {
    try {
        const r = await fetch('https://api.open-notify.org/iss-now.json');
        const d = await r.json();
        Core.updateEntity('iss', parseFloat(d.iss_position.latitude), parseFloat(d.iss_position.longitude));
    } catch(e) {}
}, 2000);

// Init Systems
ThreeAdapter.init();
Core.setView('map');
window.onresize = () => { location.reload(); }; // Simplified resize handling for architecture demo
</script>
</body>
</html>
