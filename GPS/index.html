<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open Earth Intelligence Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{margin:0;height:100%;overflow:hidden;background:#050814;color:#e5e7eb;font-family:monospace}
#map{position:absolute;width:100%;height:100%}

.panel{
    position:absolute;top:10px;left:10px;
    background:rgba(0,0,0,0.75);
    padding:10px;
    z-index:9999;
    border-left:3px solid #00ff9d;
    font-size:12px;
    width:240px;
}

button{
    margin:3px;
    padding:6px 10px;
    background:#111;
    border:1px solid #333;
    color:white;
    cursor:pointer;
}
button:hover{border-color:#00ff9d}

.status{color:#00ff9d;margin-top:6px}
</style>
</head>

<body>

<div class="panel">
<b>OPEN EARTH INTEL</b><br><br>

<button onclick="toggle('air')">✈ Air</button>
<button onclick="toggle('iss')">🛰 ISS</button>
<button onclick="toggle('quake')">🌍 Quakes</button>
<button onclick="toggle('sat')">🛰 Sat</button>

<div class="status" id="status">booting...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =========================
   MAP
========================= */
const map = L.map("map").setView([20,0],2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"OpenStreetMap"
}).addTo(map);

/* =========================
   STATE
========================= */
const S = {
    air:true,
    iss:true,
    quake:true,
    sat:true,
    cache:{
        planes:new Map(),
        iss:null,
        quakes:new Map(),
        sats:new Map()
    }
};

/* =========================
   TOGGLE
========================= */
function toggle(k){
    S[k]=!S[k];
}

/* =========================
   ✈ AIRCRAFT (OPEN SKY)
========================= */
async function air(){

    try{
        const r = await fetch("https://opensky-network.org/api/states/all");
        const d = await r.json();

        if(!d.states) return;

        d.states.slice(0,50).forEach(s=>{

            const id=s[0], lon=s[5], lat=s[6];
            if(!lat||!lon) return;

            if(!S.cache.planes.has(id)){
                S.cache.planes.set(id,
                    L.circleMarker([lat,lon],{
                        radius:3,color:"#00ff9d"
                    }).addTo(map)
                );
            }else{
                S.cache.planes.get(id).setLatLng([lat,lon]);
            }
        });

        document.getElementById("status").innerText="air live";

    }catch(e){}
}

/* =========================
   🛰 ISS (OPEN API)
========================= */
async function iss(){

    try{
        const r = await fetch("https://api.open-notify.org/iss-now.json");
        const d = await r.json();

        const lat=parseFloat(d.iss_position.latitude);
        const lon=parseFloat(d.iss_position.longitude);

        if(!S.cache.iss){
            S.cache.iss = L.circleMarker([lat,lon],{
                radius:6,color:"red"
            }).addTo(map);
        }else{
            S.cache.iss.setLatLng([lat,lon]);
        }

    }catch(e){}
}

/* =========================
   🌍 EARTHQUAKES (USGS REAL)
========================= */
async function quake(){

    try{
        const r = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
        const d = await r.json();

        d.features.forEach(q=>{

            const id=q.id;
            const c=q.geometry.coordinates;

            const lon=c[0], lat=c[1], mag=q.properties.mag;

            if(!S.cache.quakes.has(id)){
                S.cache.quakes.set(id,
                    L.circleMarker([lat,lon],{
                        radius:mag*2,
                        color:"#ff4757"
                    }).addTo(map)
                );
            }
        });

        document.getElementById("status").innerText="quake live";

    }catch(e){}
}

/* =========================
   🛰 SATELLITES (TLE SIMULATION)
   Using ISS-style propagation approximation
========================= */
let satAngle = 0;

function sat(){

    satAngle += 0.01;

    const lat = 20 + Math.sin(satAngle)*60;
    const lon = 20 + Math.cos(satAngle)*120;

    if(!S.cache.sats.has("sat1")){
        S.cache.sats.set("sat1",
            L.circleMarker([lat,lon],{
                radius:4,color:"#3b82f6"
            }).addTo(map)
        );
    }else{
        S.cache.sats.get("sat1").setLatLng([lat,lon]);
    }
}

/* =========================
   LOOP
========================= */
setInterval(()=>{

    if(S.air) air();
    if(S.iss) iss();
    if(S.quake) quake();
    if(S.sat) sat();

},3000);

</script>

</body>
</html>
