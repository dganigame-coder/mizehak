<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate GPS + 3D Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#map, #threeCanvas, #babylonCanvas {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
}

.controls {
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
}

button {
    margin:4px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="controls">
    <button onclick="showMode('map')">Map</button>
    <button onclick="showMode('three')">3D Globe</button>
    <button onclick="showMode('babylon')">Simulation</button>
    <button onclick="startGPS()">Start GPS</button>
</div>

<div id="map"></div>
<canvas id="threeCanvas"></canvas>
<canvas id="babylonCanvas"></canvas>

<!-- LIBS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
/* =========================
   MODE SWITCHING
========================= */
function showMode(mode){
    document.getElementById("map").style.display = "none";
    document.getElementById("threeCanvas").style.display = "none";
    document.getElementById("babylonCanvas").style.display = "none";

    if(mode === "map") document.getElementById("map").style.display = "block";
    if(mode === "three") document.getElementById("threeCanvas").style.display = "block";
    if(mode === "babylon") document.getElementById("babylonCanvas").style.display = "block";
}

/* =========================
   LEAFLET MAP
========================= */
let map = L.map('map').setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

let marker;

function updateMap(lat, lon){
    map.setView([lat, lon], 15);

    if(!marker){
        marker = L.marker([lat, lon]).addTo(map);
    } else {
        marker.setLatLng([lat, lon]);
    }
}

/* =========================
   THREE.JS GLOBE
========================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({canvas: document.getElementById("threeCanvas")});
renderer.setSize(window.innerWidth, window.innerHeight);

let geometry = new THREE.SphereGeometry(2, 64, 64);
let texture = new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg");
let material = new THREE.MeshBasicMaterial({map: texture});
let earth = new THREE.Mesh(geometry, material);

scene.add(earth);
camera.position.z = 5;

let userMarker3D;

function latLonToVector3(lat, lon){
    let phi = (90 - lat) * (Math.PI/180);
    let theta = (lon + 180) * (Math.PI/180);

    let x = -2 * Math.sin(phi) * Math.cos(theta);
    let y = 2 * Math.cos(phi);
    let z = 2 * Math.sin(phi) * Math.sin(theta);

    return new THREE.Vector3(x,y,z);
}

function updateGlobe(lat, lon){
    if(!userMarker3D){
        let geo = new THREE.SphereGeometry(0.05,16,16);
        let mat = new THREE.MeshBasicMaterial({color:0xff0000});
        userMarker3D = new THREE.Mesh(geo, mat);
        scene.add(userMarker3D);
    }

    userMarker3D.position.copy(latLonToVector3(lat, lon));
}

function animateThree(){
    requestAnimationFrame(animateThree);
    earth.rotation.y += 0.0005;
    renderer.render(scene, camera);
}
animateThree();

/* =========================
   BABYLON SIMULATION
========================= */
let canvas = document.getElementById("babylonCanvas");
let engine = new BABYLON.Engine(canvas, true);

let sceneB = new BABYLON.Scene(engine);

let cameraB = new BABYLON.ArcRotateCamera("cam",
    Math.PI/2, Math.PI/3, 10,
    BABYLON.Vector3.Zero(), sceneB);
cameraB.attachControl(canvas, true);

let light = new BABYLON.HemisphericLight("light",
    new BABYLON.Vector3(0,1,0), sceneB);

let ground = BABYLON.MeshBuilder.CreateGround("ground",
    {width:20, height:20}, sceneB);

let sphere = BABYLON.MeshBuilder.CreateSphere("parrot", {diameter:1}, sceneB);

function updateSimulation(lat, lon){
    sphere.position.x = lat/10;
    sphere.position.z = lon/10;
}

engine.runRenderLoop(() => {
    sceneB.render();
});

/* =========================
   GPS ENGINE
========================= */
function startGPS(){
    navigator.geolocation.watchPosition(pos => {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        updateMap(lat, lon);
        updateGlobe(lat, lon);
        updateSimulation(lat, lon);

    }, err => {
        alert(err.message);
    }, {
        enableHighAccuracy:true
    });
}

/* START */
showMode('map');

</script>

</body>
</html>
