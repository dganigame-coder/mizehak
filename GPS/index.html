<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate GPS + 3D Engine (Stable)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#map, #threeCanvas, #babylonCanvas {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
}

.controls {
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
}

button {
    margin:4px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="controls">
    <button onclick="showMode('map')">Map</button>
    <button onclick="showMode('three')">3D Globe</button>
    <button onclick="showMode('babylon')">Simulation</button>
    <button onclick="startGPS()">Start GPS</button>
    <button onclick="stopGPS()">Stop GPS</button>
</div>

<div id="map"></div>
<canvas id="threeCanvas"></canvas>
<canvas id="babylonCanvas"></canvas>

<!-- LIBS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
/* =========================
   GLOBAL
========================= */
let currentMode = null;
let gpsWatchId = null;

/* =========================
   MODE SWITCH
========================= */
const mapDiv = document.getElementById("map");
const threeCanvas = document.getElementById("threeCanvas");
const babylonCanvas = document.getElementById("babylonCanvas");

function showMode(mode){
    currentMode = mode;

    mapDiv.style.display = "none";
    threeCanvas.style.display = "none";
    babylonCanvas.style.display = "none";

    if(mode === "map") mapDiv.style.display = "block";
    if(mode === "three") threeCanvas.style.display = "block";
    if(mode === "babylon") babylonCanvas.style.display = "block";

    resizeAll();
}

/* =========================
   RESIZE FIX
========================= */
function resizeAll(){
    try {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    } catch(e){}

    try {
        engine.resize();
    } catch(e){}
}

window.addEventListener("resize", resizeAll);

/* =========================
   MAP (Leaflet)
========================= */
let map = L.map(mapDiv).setView([20,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

let marker;
let routeLine;

function updateMap(lat, lon){
    map.setView([lat, lon], 15);

    if(!marker){
        marker = L.marker([lat, lon]).addTo(map);
    } else {
        marker.setLatLng([lat, lon]);
    }
}

/* ROUTE */
map.on("click", function(e){
    if(!marker) return;

    let start = marker.getLatLng();
    let end = e.latlng;

    fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`)
    .then(r => r.json())
    .then(data => {
        if(!data.routes || !data.routes.length) return;

        let coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

        if(routeLine) map.removeLayer(routeLine);

        routeLine = L.polyline(coords, {color:"cyan"}).addTo(map);
    })
    .catch(()=>{});
});

/* =========================
   THREE.JS
========================= */
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
    75, window.innerWidth/window.innerHeight, 0.1, 1000
);

let renderer = new THREE.WebGLRenderer({
    canvas: threeCanvas,
    antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

let earthTexture = new THREE.TextureLoader().load(
    "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earthmap1k.jpg",
    undefined,
    undefined,
    () => {
        console.warn("Texture failed, using fallback color");
    }
);

let earth = new THREE.Mesh(
    new THREE.SphereGeometry(2, 64, 64),
    new THREE.MeshBasicMaterial({
        map: earthTexture || null,
        color: earthTexture ? 0xffffff : 0x2266aa
    })
);

scene.add(earth);

let atmosphere = new THREE.Mesh(
    new THREE.SphereGeometry(2.1, 64, 64),
    new THREE.MeshBasicMaterial({
        color:0x3399ff,
        transparent:true,
        opacity:0.2
    })
);
scene.add(atmosphere);

camera.position.z = 5;

let userMarker3D;

function latLonToVector3(lat, lon){
    let phi = (90 - lat) * Math.PI/180;
    let theta = (lon + 180) * Math.PI/180;

    return new THREE.Vector3(
        -2 * Math.sin(phi) * Math.cos(theta),
        2 * Math.cos(phi),
        2 * Math.sin(phi) * Math.sin(theta)
    );
}

function updateGlobe(lat, lon){
    if(!userMarker3D){
        userMarker3D = new THREE.Mesh(
            new THREE.SphereGeometry(0.05,16,16),
            new THREE.MeshBasicMaterial({color:0xff0000})
        );
        scene.add(userMarker3D);
    }

    userMarker3D.position.copy(latLonToVector3(lat, lon));
}

function animateThree(){
    requestAnimationFrame(animateThree);

    if(currentMode !== "three") return;

    earth.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animateThree();

/* =========================
   BABYLON
========================= */
let engine = new BABYLON.Engine(babylonCanvas, true);
let sceneB = new BABYLON.Scene(engine);

let cameraB = new BABYLON.ArcRotateCamera(
    "cam", Math.PI/2, Math.PI/3, 20,
    BABYLON.Vector3.Zero(), sceneB
);
cameraB.attachControl(babylonCanvas, true);

new BABYLON.HemisphericLight("light",
    new BABYLON.Vector3(0,1,0), sceneB);

BABYLON.MeshBuilder.CreateGround("ground",
    {width:50, height:50}, sceneB);

let sphere = BABYLON.MeshBuilder.CreateSphere(
    "parrot", {diameter:1}, sceneB
);

function updateSimulation(lat, lon){
    sphere.position.x = (lat - 32) * 5;
    sphere.position.z = (lon - 34) * 5;
}

engine.runRenderLoop(() => {
    if(currentMode === "babylon"){
        sceneB.render();
    }
});

/* =========================
   GPS
========================= */
function startGPS(){
    if(gpsWatchId) return;

    if(!navigator.geolocation){
        alert("Geolocation not supported");
        return;
    }

    gpsWatchId = navigator.geolocation.watchPosition(pos => {
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        updateMap(lat, lon);
        updateGlobe(lat, lon);
        updateSimulation(lat, lon);

    }, err => {
        alert(err.message);
    }, {
        enableHighAccuracy:true
    });
}

function stopGPS(){
    if(gpsWatchId){
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
    }
}

/* START */
showMode("map");

</script>

</body>
</html>
