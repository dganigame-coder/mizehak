<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS SLM WORLD ENGINE v1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#050814;
    font-family:monospace;
    color:#e2e8f0;
}

#map,#three{
    position:absolute;
    width:100%;
    height:100%;
}

#three{display:none;}

.hud{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-left:3px solid #00ff9d;
    z-index:1000;
}

.controls{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
}

button{
    margin:3px;
    padding:8px 12px;
    background:transparent;
    border:1px solid #444;
    color:white;
    cursor:pointer;
}
button:hover{border-color:#00ff9d;}
</style>
</head>
<body>

<div class="hud">
🧠 NEXUS SLM WORLD ENGINE<br>
Mode: <span id="mode">MAP</span><br>
Entities: <span id="count">0</span>
</div>

<div class="controls">
<button onclick="setView('map')">2D Map</button>
<button onclick="setView('3d')">3D Globe</button>
<button onclick="toggleGPS()">GPS</button>
</div>

<div id="map"></div>
<canvas id="three"></canvas>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================
   WORLD STATE + SLM CORE
========================= */
const World = {
    entities: new Map(),
    gps: null,
    view: "map"
};

/* 🧠 "SLM-LIKE" BEHAVIOR MODEL */
function classify(entity){

    const v = Math.sqrt(entity.vx**2 + entity.vy**2);

    if(v < 0.0005) return "idle";
    if(v < 0.003) return "walking";
    return "flying";
}

/* prediction model */
function predict(e, dt=1){
    return {
        lat: e.lat + e.vy * dt,
        lon: e.lon + e.vx * dt
    };
}

/* =========================
   INIT PARROT FLOCK
========================= */
for(let i=0;i<40;i++){
    World.entities.set("p"+i,{
        id:"p"+i,
        lat:32 + Math.random()*0.2,
        lon:34 + Math.random()*0.2,
        vx:(Math.random()-0.5)*0.002,
        vy:(Math.random()-0.5)*0.002,
        trail:[]
    });
}

/* =========================
   SIMULATION ENGINE
========================= */
function simulate(){

    for(let e of World.entities.values()){

        // flock behavior (boids-lite)
        let ax=0, ay=0, cx=0, cy=0, count=0;

        for(let o of World.entities.values()){
            if(o===e) continue;

            let dx=o.lon-e.lon;
            let dy=o.lat-e.lat;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<0.05){
                cx+=o.lon;
                cy+=o.lat;
                ax+=o.vx;
                ay+=o.vy;
                count++;
            }
        }

        if(count>0){
            e.vx += (ax/count)*0.01;
            e.vy += (ay/count)*0.01;

            e.vx += (cx/count - e.lon)*0.0005;
            e.vy += (cy/count - e.lat)*0.0005;
        }

        // clamp
        e.vx = Math.max(-0.01, Math.min(0.01, e.vx));
        e.vy = Math.max(-0.01, Math.min(0.01, e.vy));

        e.lat += e.vy;
        e.lon += e.vx;

        e.trail.push([e.lat,e.lon]);
        if(e.trail.length>20) e.trail.shift();

        e.state = classify(e);
    }

    document.getElementById("count").innerText = World.entities.size;
}

/* =========================
   LEAFLET MAP
========================= */
const map = L.map("map").setView([32,34],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const markers = new Map();

function renderMap(){

    if(World.view!=="map") return;

    for(let e of World.entities.values()){

        if(!markers.has(e.id)){
            markers.set(e.id,
                L.circleMarker([e.lat,e.lon],{
                    radius:4,
                    color:"#00ff9d"
                }).addTo(map)
            );
        }

        markers.get(e.id).setLatLng([e.lat,e.lon]);
    }
}

/* =========================
   THREE.JS VIEW
========================= */
const canvas = document.getElementById("three");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({canvas});

renderer.setSize(innerWidth,innerHeight);

const globe = new THREE.Mesh(
    new THREE.SphereGeometry(2,64,64),
    new THREE.MeshBasicMaterial({
        map:new THREE.TextureLoader().load(
            "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
        )
    })
);

scene.add(globe);
camera.position.z=5;

const dots = new Map();

function latLonTo3D(lat,lon){
    let phi=(90-lat)*Math.PI/180;
    let theta=(lon+180)*Math.PI/180;

    return new THREE.Vector3(
        -2*Math.sin(phi)*Math.cos(theta),
         2*Math.cos(phi),
         2*Math.sin(phi)*Math.sin(theta)
    );
}

function render3D(){

    if(World.view!=="3d") return;

    for(let e of World.entities.values()){

        if(!dots.has(e.id)){
            let m=new THREE.Mesh(
                new THREE.SphereGeometry(0.03),
                new THREE.MeshBasicMaterial({color:0xffcc00})
            );
            globe.add(m);
            dots.set(e.id,m);
        }

        let p=predict(e,0.5);
        dots.get(e.id).position.copy(latLonTo3D(p.lat,p.lon));
    }

    globe.rotation.y += 0.001;
    renderer.render(scene,camera);
}

/* =========================
   GPS INPUT (USER AGENT)
========================= */
function toggleGPS(){

    if(World.gps){
        navigator.geolocation.clearWatch(World.gps);
        World.gps=null;
        return;
    }

    World.gps = navigator.geolocation.watchPosition(p=>{

        World.entities.set("user",{
            id:"user",
            lat:p.coords.latitude,
            lon:p.coords.longitude,
            vx:0,
            vy:0,
            trail:[]
        });

    },err=>console.log(err),{
        enableHighAccuracy:true
    });
}

/* =========================
   VIEW SWITCH
========================= */
function setView(v){

    World.view=v;

    map.style.display = v==="map"?"block":"none";
    canvas.style.display = v==="3d"?"block":"none";

    document.getElementById("mode").innerText=v.toUpperCase();
}

/* =========================
   MAIN LOOP
========================= */
function loop(){

    simulate();
    renderMap();
    render3D();

    requestAnimationFrame(loop);
}

setView("map");
loop();

/* resize */
window.onresize=()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
};
</script>

</body>
</html>
